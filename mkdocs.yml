    - CLI Reference: reference/cli.md
    - CIC–RL Cross Reference: reference/cic-rl-cross-reference.md
    - Integration Guide: reference/integration-guide.md
    - Handbook: reference/handbook.md
    - Knowledge Graph: reference/knowledge-graph/readme.md
    - Changelog: reference/changelog.md

  - Archive:
    - Projects: archive/projects/
    - Build Output: archive/build-output/
    - Phases (Completed): archive/phases/
    - Research: archive/research/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rewrite-labs/cic-kb
  version:
    provider: mike

extra_css:
