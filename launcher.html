<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toolforge Launcher</title>
<style>
  body { background:#0a0a0a; color:#eee; font-family:Consolas, monospace; padding:20px; }
  h1 { color:#00ff88; }
  .tool { border:1px solid #333; padding:10px; margin-bottom:8px; }
  button { background:#00ff88; border:none; padding:6px 10px; cursor:pointer; }
</style>
</head>
<body>
<h1>Toolforge Launcher</h1>
<div id="tools"></div>

<script>
async function loadTools() {
  const res = await fetch("http://localhost:8080/tools");
  const data = await res.json();
  const container = document.getElementById("tools");

  data.tools.forEach(t => {
    const div = document.createElement("div");
    div.className = "tool";
    div.innerHTML = `
      <strong>${t.name}</strong> [${t.category}]<br>
      <code>${t.path}</code><br>
      <button data-path="${t.path}">Run</button>
    `;
    container.appendChild(div);
  });

  container.addEventListener("click", e => {
    if (e.target.tagName === "BUTTON") {
      const p = e.target.getAttribute("data-path");
      alert("Run tool at: " + p + " (wire to pwsh/node runner)");
    }
  });
}

loadTools();
</script>
</body>
</html>
