    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    header { background: #0d0b08; padding: 2rem 4rem; border-bottom: 1px solid rgba(196, 80, 26, 0.2); position: sticky; top: 0; z-index: 1000; }

    .logo { font-family: "Barlow Condensed", sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--brass); margin-bottom: 1rem; }
    h1 { font-family: "Playfair Display", serif; font-size: 2.5rem; font-weight: 400; color: var(--white); letter-spacing: -0.02em; }
    .subtitle { font-family: "Barlow Condensed", sans-serif; font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ash); margin-top: 0.5rem; }
    .controls { margin-top: 2rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-btn, .refresh-btn { font-family: "Barlow Condensed", sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600; padding: 0.5rem 1rem; background: rgba(30, 26, 23, 0.9); color: var(--ash); border: 1px solid rgba(154, 144, 136, 0.15); cursor: pointer; transition: all 0.2s ease; }
    .filter-btn:hover, .refresh-btn:hover { border-color: rgba(196, 80, 26, 0.4); color: var(--bone); }
    .filter-btn.active { background: rgba(196, 80, 26, 0.15); border-color: rgba(196, 80, 26, 0.7); color: var(--ember); }
    .stats { font-family: "Barlow Condensed", sans-serif; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ash); }
    .stat-value { font-weight: 700; color: var(--ember); margin-right: 0.5rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 4rem; }
    @media (max-width: 768px) { .container { padding: 2rem; } h1 { font-size: 1.8rem; } header { padding: 1.5rem 2rem; } }
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
    .skill-card { background: rgba(30, 26, 23, 0.7); border: 1px solid rgba(154, 144, 136, 0.08); display: flex; flex-direction: column; transition: all 0.25s ease; cursor: pointer; }
    .skill-card:hover { border-color: rgba(196, 80, 26, 0.5); background: rgba(30, 26, 23, 0.9); }
    .skill-header { padding: 1.5rem; border-bottom: 1px solid rgba(154, 144, 136, 0.08); }
    .skill-category { font-family: "Barlow Condensed", sans-serif; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--rust); font-weight: 700; margin-bottom: 0.5rem; display: block; }
    .skill-name { font-family: "Playfair Display", serif; font-size: 1.4rem; font-weight: 400; color: var(--white); letter-spacing: -0.01em; }
    .skill-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 1rem; }
    .skill-description { font-size: 0.95rem; line-height: 1.5; color: var(--bone); }
    .skill-metadata { display: flex; flex-direction: column; gap: 0.75rem; margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(154, 144, 136, 0.08); }
    .meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
    .meta-label { font-family: "Barlow Condensed", sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ash); font-weight: 600; }
    .meta-value { font-family: "Barlow Condensed", sans-serif; font-weight: 600; letter-spacing: 0.1em; color: var(--bone); }
    .status-badge { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.75rem; background: rgba(30, 26, 23, 0.9); border: 1px solid rgba(154, 144, 136, 0.15); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
    .status-badge::before { content: "●"; font-size: 0.5rem; }
    .status-badge.active { border-color: rgba(232, 224, 212, 0.3); color: var(--bone); }
    .status-badge.active::before { color: var(--bone); }
    .health-good { border-color: rgba(232, 224, 212, 0.3); }
    .health-good::before { color: var(--bone); }
    .health-warn { border-color: rgba(139, 58, 26, 0.4); }
    .health-warn::before { color: var(--rust); }
    .health-error { border-color: rgba(196, 80, 26, 0.4); }
    .health-error::before { color: var(--ember); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--ash); }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }
    .last-updated { font-family: "Barlow Condensed", sans-serif; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ash); margin-left: auto; }
    .skill-card:focus-visible { outline: 2px solid var(--ember); outline-offset: -1px; }
    .filter-btn:focus-visible, .refresh-btn:focus-visible { outline: 2px solid var(--ember); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }
  </style>
</head>

</header>

<script>
  let allSkills = [];
  let activeCategory = "all";

  function loadSkills() {
    try {
      const manifestEl = document.getElementById("manifest-data");
      const manifestData = JSON.parse(manifestEl.textContent);
      allSkills = manifestData.skills || [];
      render();
      updateTimestamp();
    } catch (error) {
      console.error("Error loading skills:", error);
      showError("Failed to load skill inventory.");
    }
  }

  function render() {
    renderFilters();
    renderSkills();
    updateStats();
  }

  function renderFilters() {
    const container = document.getElementById("filters");
    container.innerHTML = "";
    const categories = new Set(["all"]);
    allSkills.forEach(skill => {
      if (skill.category) categories.add(skill.category);
    });
    Array.from(categories).sort().forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "filter-btn " + (cat === activeCategory ? "active" : "");
      btn.textContent = cat === "all" ? "All Skills" : cat.toUpperCase();
      btn.onclick = () => {
        activeCategory = cat;
        render();
      };
      container.appendChild(btn);
    });
  }

  function renderSkills() {
    const container = document.getElementById("skills-container");
    let filtered = allSkills;
    if (activeCategory !== "all") {
      filtered = allSkills.filter(s => s.category === activeCategory);
    }
    if (filtered.length === 0) {
      container.innerHTML = "<div class=\"empty-state\"><p>No skills found in this category.</p></div>";
      return;
    }
    container.innerHTML = filtered.sort((a, b) => (a.name || "").localeCompare(b.name || "")).map(skill => createSkillCard(skill)).join("");
  }

  function createSkillCard(skill) {
    const statusClass = skill.status === "active" ? "active" : "inactive";
    const healthClass = skill.health && skill.health.overall === "good" ? "health-good" : skill.health && skill.health.overall === "warn" ? "health-warn" : "health-error";
    const tagsHtml = skill.tags && skill.tags.length > 0 ?
      "<div class=\"meta-row\">" +
      "<span class=\"meta-label\">TAGS</span>" +
      "<span class=\"meta-value\">" + skill.tags.join(", ") + "</span>" +
      "</div>" : "";
    const invocationHtml = skill.invocation ?
      "<div class=\"meta-row\">" +
      "<span class=\"meta-label\">INVOCATION</span>" +
      "<span class=\"meta-value\" style=\"font-family: 'Courier New', monospace; font-size: 0.75rem;\">" + skill.invocation + "</span>" +
      "</div>" : "";
    const exportsHtml = skill.exports ?
      "<div class=\"meta-row\">" +
      "<span class=\"meta-label\">EXPORTS</span>" +
      "<span class=\"meta-value\" style=\"font-family: 'Courier New', monospace; font-size: 0.75rem;\">" + skill.exports + "</span>" +
      "</div>" : "";
    const html = "<div class=\"skill-card\" tabindex=\"0\">" +
      "<div class=\"skill-header\">" +
      "<span class=\"skill-category\">" + (skill.category || "UNCATEGORIZED") + "</span>" +
      "<h2 class=\"skill-name\">" + (skill.name || skill.id || "Unknown") + "</h2>" +
      "</div>" +
      "<div class=\"skill-body\">" +
      "<p class=\"skill-description\">" + (skill.description || "No description available.") + "</p>" +
      "<div class=\"skill-metadata\">" +
      "<div class=\"meta-row\">" +
      "<span class=\"meta-label\">RUNTIME</span>" +
      "<span class=\"meta-value\">" + (skill.runtime || "—") + "</span>" +
      "</div>" +
      "<div class=\"meta-row\">" +
      "<span class=\"meta-label\">VERSION</span>" +
      "<span class=\"meta-value\">" + (skill.version || "—") + "</span>" +
      "</div>" +
      "<div class=\"meta-row\">" +
      "<span class=\"meta-label\">STATUS</span>" +
      "<span class=\"status-badge " + statusClass + "\">" + (skill.status || "unknown") + "</span>" +
      "</div>" +
      "<div class=\"meta-row\">" +
      "<span class=\"meta-label\">HEALTH</span>" +
      "<span class=\"status-badge " + healthClass + "\">" + (skill.health && skill.health.overall || "unknown") + "</span>" +
      "</div>" +
      "<div class=\"meta-row\">" +
      "<span class=\"meta-label\">OWNER</span>" +
      "<span class=\"meta-value\">" + (skill.owner || "—") + "</span>" +
      "</div>" +
      tagsHtml +
      invocationHtml +
      exportsHtml +
      "</div>" +
      "</div>" +
      "</div>";
    return html;
  }

  function updateStats() {
    const activeSkills = allSkills.filter(s => s.status === "active").length;
    document.getElementById("total-count").textContent = allSkills.length;
    document.getElementById("active-count").textContent = activeSkills;
  }

  function updateTimestamp() {
    const now = new Date();
    const time = now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    document.getElementById("last-updated").textContent = "Updated: " + time;
  }

  function showError(message) {
    const container = document.getElementById("skills-container");
    container.innerHTML = "<div class=\"empty-state\"><p>" + message + "</p></div>";
  }

  document.getElementById("refresh-btn").onclick = () => {
    loadSkills();
  };

  document.getElementById("hard-refresh-btn").onclick = () => {
    location.reload(true);
  };

  loadSkills();
</script>
